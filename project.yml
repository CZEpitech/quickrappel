name: QuickRappel
options:
  bundleIdPrefix: com.czsyn
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: TY5QDFF2SB
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
targets:
  QuickRappel:
    type: application
    platform: macOS
    sources: [App]
    dependencies:
      - target: QuickRappelWidget
        embed: true
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: QuickRappel
        LSUIElement: true
        NSRemindersFullAccessUsageDescription: "QuickRappel enregistre vos rappels dans l'app Rappels."
        NSRemindersUsageDescription: "QuickRappel enregistre vos rappels dans l'app Rappels."
        CFBundleURLTypes:
          - CFBundleURLName: com.czsyn.quickrappel
            CFBundleURLSchemes: [quickrappel]
  QuickRappelWidget:
    type: app-extension
    platform: macOS
    sources: [Widget]
    entitlements:
      path: Widget/QuickRappelWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: QuickRappel Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
